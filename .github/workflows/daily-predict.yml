name: 一键比赛预测

on:
  workflow_dispatch: {}

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: 运行预测
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python main.py
